version: '3.8'

services:
  # PostgreSQL Database (Supabase alternative for local dev)
  postgres:
    image: postgres:15-alpine
    container_name: grawizah-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: grawizah_password
      POSTGRES_DB: grawizah
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - grawizah-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: grawizah-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - grawizah-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grawizah-backend
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - grawizah-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  grawizah-network:
    driver: bridge
